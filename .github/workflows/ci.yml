name: CI

on:
  push:
    branches:
      - main
      - react-ui-migration-issue-9
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install root dependencies
        run: npm ci

      - name: Install sidepanel dependencies
        run: cd sidepanel && npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
